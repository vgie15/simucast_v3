services:
  # --- backend API ---
  - type: web
    name: simu-cast-api
    env: python
    plan: free
    rootDir: backend

    # 👇 FORCE correct Python version (this is the key fix)
    pythonVersion: 3.10.13

    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt

    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: simu-cast-db
          property: connectionString

      - key: CORS_ORIGINS
        value: https://simu-cast-web.onrender.com


  # --- frontend static site ---
  - type: web
    name: simu-cast-web
    runtime: static

    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist

    envVars:
      - key: VITE_API_URL
        value: https://simu-cast-api.onrender.com

    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN

    routes:
      - type: rewrite
        source: /*
        destination: /index.html


# --- database ---
databases:
  - name: simu-cast-db
    plan: free
    databaseName: simucast
    user: simucast
